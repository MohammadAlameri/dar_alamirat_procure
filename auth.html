<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="loginTitle">Login - Dar Alamirat Procurement</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="d-flex justify-content-center align-items-center mb-2">
                    <i data-lucide="shopping-cart" class="text-primary me-2" style="width: 32px; height: 32px;"></i>
                    <h3 class="fw-bold mb-0" style="color: var(--primary-color);" data-i18n="title">Dar Alamirat</h3>
                </div>
                <p class="text-muted" data-i18n="procurementSystem">Procurement Management System</p>
                <!-- Language Switcher -->
                <div class="mb-3">
                    <button class="btn btn-sm btn-outline-secondary" id="langSwitchBtn">
                        <i data-lucide="languages" class="me-1"></i>
                        <span id="langText">العربية</span>
                    </button>
                </div>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label" for="email" data-i18n="emailAddress">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i data-lucide="mail" style="width: 18px;"></i></span>
                        <input type="email" class="form-control bg-light border-start-0" id="email" data-i18n="emailAddress" required>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label" for="password" data-i18n="password">Password</label>
                        <a href="#" class="text-decoration-none small text-primary" data-i18n="forgot">Forgot?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i data-lucide="lock" style="width: 18px;"></i></span>
                        <input type="password" class="form-control bg-light border-start-0" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label small" for="remember" data-i18n="rememberMe">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="loginBtn" data-i18n="signIn">
                    Sign In
                </button>
            </form>

            <div id="authAlert" class="mt-3 d-none">
                <div class="alert alert-danger py-2 small mb-0" role="alert"></div>
            </div>

            <div class="mt-4 text-center">
                <p class="small text-muted mb-0"><span data-i18n="noAccount">Don't have an account?</span> <a href="#" class="text-primary text-decoration-none fw-semibold" data-i18n="contactAdmin">Contact Admin</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/i18n.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        i18nManager.init();
        
        // Language switch logic for auth page
        const langToggle = document.getElementById('langSwitchBtn');
        const langText = document.getElementById('langText');
        
        if (i18nManager.currentLang === 'ar') {
            langText.innerText = 'English';
        } else {
            langText.innerText = 'العربية';
        }

        langToggle.addEventListener('click', () => {
            const newLang = i18nManager.currentLang === 'en' ? 'ar' : 'en';
            i18nManager.setLanguage(newLang);
        });

        lucide.createIcons();
    </script>
</body>
</html>
